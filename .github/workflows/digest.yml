name: GitHub Changelog Digest

on:
  schedule:
    # Target delivery window: 8-10 AM Pacific. GitHub queues scheduled runs with
    # a large, variable delay (this repo's last 14 runs: ~1h50m-6h20m, median
    # ~4.7h), so the cron is set by working backwards from the *observed* delay
    # rather than the nominal time. 11:45 UTC + the usual delay lands in
    # 15:00-17:00 UTC = 8-10 AM PDT on ~11 of 14 days (the old 13:23 cron only
    # hit it ~3 of 14 — it mostly arrived 10-11:30 AM). Off-the-hour minute
    # avoids GitHub's worst top-of-hour congestion.
    # Caveats: best-effort, not a guarantee — fast-queue days can arrive ~6:45 AM
    # and congested days can slip past 10 AM. Fixed UTC drifts ~1h vs Pacific
    # across DST; for PST (winter) shift to ~12:45 UTC to stay in window.
    - cron: '45 11 * * *'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send only to this email (leave empty for all recipients)'
        type: string
        default: ''
      dry_run:
        description: 'Dry run (no email sent)'
        type: boolean
        default: false
      force:
        description: 'Force send even if no new entries'
        type: boolean
        default: false

concurrency:
  group: changelog-digest
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v4

      - name: Install & Run
        id: run
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          # Manual test-run override (workflow_dispatch input). When set, the
          # digest goes only to this address. Leave empty for normal runs.
          DIGEST_TEST_EMAIL: ${{ inputs.test_email }}
          # Recipient list (comma-separated) — where subscribers live.
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          uv venv && source .venv/bin/activate
          uv pip install -r requirements.lock
          git pull --rebase || true
          mkdir -p data
          
          ARGS="${{ github.event_name == 'workflow_dispatch' && '--all' || '' }} ${{ inputs.force && '--force' || '' }} ${{ inputs.dry_run && '--dry-run' || '' }}"
          
          echo "dry_run=${{ inputs.dry_run || 'false' }}" >> $GITHUB_OUTPUT
          cd src && uv run python main.py $ARGS

      - name: Persist state
        # Never persist on test-email runs: only the test address received the
        # email, so marking entries processed would skip them for everyone else.
        if: success() && !inputs.dry_run && inputs.test_email == ''
        run: |
          git diff --quiet data/state.json 2>/dev/null && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "state [skip ci]"

          # Push with rebase-and-retry. Another commit (e.g. a merged PR) can
          # land on the branch between this run's checkout and now; a bare push
          # would then be rejected and state.json would never persist — causing
          # the next run to re-send already-sent entries (duplicates). Rebasing
          # onto the latest and retrying closes that window. Other commits don't
          # touch state.json, so the rebase replays our commit cleanly.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5) — rebasing onto latest and retrying"
            git pull --rebase || true
          done
          echo "::error::Failed to persist data/state.json after 5 attempts"
          exit 1

      - if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📧 Changelog Digest
          | | |
          |---|---|
          | Status | ${{ job.status == 'success' && '✅' || '❌' }} |
          | Trigger | `${{ github.event_name }}` |
          | Test Email | `${{ inputs.test_email || 'all recipients' }}` |
          | Force | `${{ inputs.force || false }}` |
          | Dry Run | `${{ inputs.dry_run || false }}` |
          EOF

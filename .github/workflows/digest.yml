name: GitHub Changelog Digest

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 16 * * *'  # 8 AM PT daily
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send only to this email (leave empty for all recipients)'
        type: string
        default: ''
      dry_run:
        description: 'Dry run (no email sent)'
        type: boolean
        default: false
      force:
        description: 'Force send even if no new entries'
        type: boolean
        default: false

concurrency:
  group: changelog-digest
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: python -m compileall src

      - name: Test
        run: |
          if [ -d tests ]; then
            python -m unittest discover -s tests -p "test*.py"
          else
            echo "No tests directory found; skipping tests."
          fi

  deploy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: python -m compileall src

      - name: Test
        run: |
          if [ -d tests ]; then
            python -m unittest discover -s tests -p "test*.py"
          else
            echo "No tests directory found; skipping tests."
          fi

      - name: Deploy digest
        id: run
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          DIGEST_TO_EMAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.test_email || secrets.DIGEST_TO_EMAIL }}
        run: |
          mkdir -p data
          
          ARGS="${{ github.event_name == 'workflow_dispatch' && '--all' || '' }} ${{ github.event_name == 'workflow_dispatch' && inputs.force && '--force' || '' }} ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '--dry-run' || '' }}"
          
          echo "dry_run=${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}" >> $GITHUB_OUTPUT
          cd src && python main.py $ARGS

      - name: Persist state
        if: success() && !inputs.dry_run
        run: |
          git diff --quiet data/state.json 2>/dev/null && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json && git commit -m "state [skip ci]" && git push

      - if: always()
        run: |
           cat >> $GITHUB_STEP_SUMMARY << 'EOF'
           ## 📧 Changelog Digest
           | | |
           |---|---|
            | Status | ${{ job.status == 'success' && '✅' || '❌' }} |
           | Trigger | `${{ github.event_name }}` |
           | Test Email | `${{ github.event_name == 'workflow_dispatch' && inputs.test_email || 'all recipients' }}` |
           | Force | `${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}` |
           | Dry Run | `${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}` |
           EOF
